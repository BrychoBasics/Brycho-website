<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bryce | Film Portfolio</title>
    <link rel="stylesheet" href="film-style.css">
</head>
<body>

    <div id="af-cursor" class="cursor-fade"></div>

    <main class="scroll-container">

        <section class="snap-section reel-section">
            <video id="main-reel" class="reel-video" autoplay loop muted playsinline>
                <source src="assets/reel.mp4" type="video/mp4">
            </video>
            
            <div class="viewfinder-grid fade-ui" style="pointer-events: none;">
                <div class="rec-indicator"><span class="red-dot"></span> REC</div>
                <div class="corner top-left"></div>
                <div class="corner top-right"></div>
                <div class="corner bottom-left"></div>
                <div class="corner bottom-right"></div>
            </div>

            <div class="reel-text-container fade-ui">
                <h1 class="reel-title">Hello, My name is Bryce.</h1>
                <p class="reel-subtitle">I'm a director and cinematographer handcrafting media out of Iowa City, IA. 
                    Scroll down to see my reel and recent or upcoming projects.</p>
            </div>

            <div class="timeline-container fade-ui">
                <div class="timeline-ticks"></div>
                <div class="timeline-progress" id="reel-progress"></div>
            </div>
        </section>

        <section class="snap-section work-section">

            <div class="filmstrip-container">
                
                <div class="film-project-card" 
                     data-title="Cambike" 
                     data-roles="Director, Writer, Producer, Cinematographer, Actor, Editor" 
                     data-desc="What if Cambus replaced all their buses with bikes?"
                     data-video="assets/cambike.mp4"> 
                    <video class="thumbnail-video" autoplay loop muted playsinline>
                        <source src="assets/cambike.mp4" type="video/mp4">
                    </video>
                    <div class="expand-overlay"><span class="expand-icon">⛶</span></div>
                </div>

                <div class="film-project-card" 
                     data-title="All That Matters" 
                     data-roles="Director, Editor, Writer, Cinematographer" 
                     data-desc="Hometown script exploration."
                     data-video="assets/project1-FULL.mp4"> 
                    <video class="thumbnail-video" autoplay loop muted playsinline>
                        <source src="assets/cambike.mp4" type="video/mp4">
                    </video>
                    <div class="expand-overlay"><span class="expand-icon">⛶</span></div>
                </div>

                <div class="film-project-card" 
                     data-title="For Context" 
                     data-roles="Writer, Director, Cinematographer" 
                     data-desc="Hometown script exploration."
                     data-video="assets/project1-FULL.mp4"> 
                    <video class="thumbnail-video" autoplay loop muted playsinline>
                        <source src="assets/cambike.mp4" type="video/mp4">
                    </video>
                    <div class="expand-overlay"><span class="expand-icon">⛶</span></div>
                </div>

            </div> <div class="work-details">
                <h3 id="dynamic-title">Hover over a project</h3>
                <p id="dynamic-roles"></p>
                <p id="dynamic-desc"></p>
            </div>
        </section>

        <section class="snap-section footer-section">
            <div class="cta-primary">
    <h2 class="cta-title">Let's make something together.</h2>
    <div class="cta-links">
        <a href="mailto:bryce.connect@gmail.com">Email</a>
        <a href="https://instagram.com/bryce__krispies">Instagram</a>
    </div>
</div>
    
        
        </section>

    </main>

    <div id="fullscreen-modal" class="fullscreen-modal fade-ui">
    <div class="close-btn fade-ui" id="close-modal">×</div>
    <video id="modal-video" class="fullscreen-video" controls autoplay playsinline></video>
</div>
    <script src="film-script.js"></script>
</body>
</html>
